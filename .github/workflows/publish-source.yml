name: Publish AltStore source

# Fires when a release is published (including a draft flipping to published).
# Only at that point is the IPA download URL live, so only now may
# source/apps.json — served raw from main — start advertising the version.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update apps.json from the published release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_ID: ${{ github.event.release.id }}
          PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: |
          ASSET=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID" \
            --jq '.assets[] | select(.name | endswith(".ipa")) | "\(.browser_download_url) \(.size)"' \
            | head -1)
          if [ -z "$ASSET" ]; then
            echo "Release $TAG has no IPA asset — nothing to publish"
            exit 1
          fi
          URL=${ASSET% *}
          SIZE=${ASSET##* }
          NOTES_FILE="$RUNNER_TEMP/notes.md"
          gh api "repos/${{ github.repository }}/releases/$RELEASE_ID" \
            --jq '.body // ""' > "$NOTES_FILE"
          python3 scripts/update_source.py \
            --version "$TAG" \
            --download-url "$URL" \
            --size "$SIZE" \
            --date "$PUBLISHED_AT" \
            --notes-file "$NOTES_FILE"

      - name: Commit and push
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source/apps.json
          git commit -m "Update source to $TAG [skip ci]"
          git push
